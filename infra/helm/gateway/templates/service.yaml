apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app: gateway
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: ws
      port: {{ .Values.service.wsPort }}
      targetPort: {{ .Values.service.wsPort }}
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: {{ .Values.service.grpcPort }}
  selector:
    app: gateway
