{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-gateway-tls
spec:
  secretName: {{ .Release.Name }}-gateway-tls
  issuerRef:
    name: {{ .Values.tls.issuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.tls.hostName }}
  duration: 2160h
  renewBefore: 360h
{{- end }}
