replicaCount: 3
image:
  repository: ghcr.io/thaolaptrinh/spatial-game-server
  tag: dev-latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  grpcPort: 9000
  headless: true
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  cpuTarget: 70
mtls:
  enabled: false
secretRef: game-server-secret
env:
  grpc__host: "0.0.0.0"
  grpc__port: "9000"
  room_service__addr: "room-service:9000"
  register_on_start: "true"
