apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-game-server
  labels:
    app: game-server
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.headless }}
  clusterIP: None
  {{- end }}
  ports:
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: {{ .Values.service.grpcPort }}
  selector:
    app: game-server
