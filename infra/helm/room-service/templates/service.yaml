apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-room-service
  labels:
    app: room-service
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: {{ .Values.service.grpcPort }}
  selector:
    app: room-service
