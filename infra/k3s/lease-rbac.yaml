apiVersion: v1
kind: ServiceAccount
metadata:
  name: room-service
  namespace: spatial-server
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: room-service-lease
  namespace: spatial-server
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: room-service-lease
  namespace: spatial-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: room-service-lease
subjects:
- kind: ServiceAccount
  name: room-service
  namespace: spatial-server
