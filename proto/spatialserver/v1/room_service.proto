syntax = "proto3";

package spatialserver.v1;

option go_package = "github.com/thaolaptrinh/spatial-server/proto/gen/spatialserver/v1;spatialserverv1";

import "spatialserver/v1/common.proto";

service RoomService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc PrepareShutdown(spatialserver.v1.ServerID) returns (PrepareShutdownResponse);
  rpc LookupZone(LookupZoneRequest) returns (LookupZoneResponse);
  rpc LookupServer(LookupServerRequest) returns (LookupServerResponse);
  rpc ReportMetrics(ReportMetricsRequest) returns (ReportMetricsResponse);
  rpc TransferZone(stream spatialserver.v1.ZoneSnapshot) returns (TransferZoneResponse);
  rpc PrepareTransfer(PrepareTransferRequest) returns (PrepareTransferResponse);
  rpc WatchOwnership(WatchRequest) returns (stream OwnershipChange);
}

message RegisterRequest {
  string server_id = 1;
  string host = 2;
  int32 port = 3;
  int32 max_zones = 4;
  map<string, string> metadata = 5;
  // Node descriptor fields (adr-025).
  string advertise_addr = 6;
  string version = 7;
  string build = 8;
  map<string, string> labels = 9;
}

message RegisterResponse {
  bool success = 1;
}

message HeartbeatRequest {
  string node_id = 1;
  // Scheduling-relevant load (not a general metrics dump).
  int32 active_entities = 2;
  int32 active_spaces = 3;
  int32 connected_users = 4;
  int32 queue_depth = 5;
  double tick_duration_ms = 6;
}

message HeartbeatResponse {
  bool acknowledged = 1;
}

message PrepareShutdownResponse {
  bool acknowledged = 1;
}

message LookupZoneRequest {
  string zone_id = 1;
}

message LookupZoneResponse {
  spatialserver.v1.ServerID server = 1;
  string advertise_addr = 2;
  // Deprecated — use advertise_addr.
  string host = 3 [deprecated = true];
  int32 port = 4 [deprecated = true];
}

message LookupServerRequest {
  string server_id = 1;
}

message LookupServerResponse {
  string host = 1;
  int32 port = 2;
  spatialserver.v1.ServerStatus status = 3;
}

message ReportMetricsRequest {
  double cpu_usage = 1;
  double memory_usage = 2;
  int32 active_connections = 3;
  int32 active_runtimes = 4;
}

message ReportMetricsResponse {
  bool acknowledged = 1;
}

message TransferZoneResponse {
  bool success = 1;
}

message PrepareTransferRequest {
  string zone_id = 1;
  string target_server_id = 2;
}

message PrepareTransferResponse {
  bool accepted = 1;
}

message WatchRequest {}

message OwnershipChange {
  string zone_id = 1;
  string server_id = 2;
  string host = 3;
  int32 port = 4;
}
