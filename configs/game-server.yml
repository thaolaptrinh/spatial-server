service:
  name: game-server
  instance: "1"
  debug: false

logging:
  level: info
  json: true

grpc:
  host: "0.0.0.0"
  port: 9000

game:
  tick_rate: 50ms
  snapshot_interval: 100
  max_entities: 5000
  zone_cell_size: 100
  aoi_radius: 300
  npcs:
    - type: npc
      behavior: patrol
      position: {x: 100, y: 0, z: 100}
      waypoints: [{x: 100, y: 0, z: 100}, {x: 110, y: 0, z: 110}]
    - type: npc
      behavior: wander
      position: {x: 90, y: 0, z: 90}
      radius: 15
