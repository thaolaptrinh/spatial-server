name: Release Images
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/gateway.Dockerfile
          push: true
          tags: ghcr.io/thaolaptrinh/spatial-gateway:${{ github.ref_name }}
      - name: Build and push room-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/room-service.Dockerfile
          push: true
          tags: ghcr.io/thaolaptrinh/spatial-room-service:${{ github.ref_name }}
      - name: Build and push game-server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/game-server.Dockerfile
          push: true
          tags: ghcr.io/thaolaptrinh/spatial-game-server:${{ github.ref_name }}
