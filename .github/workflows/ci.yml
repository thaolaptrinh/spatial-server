name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Format
        run: go fmt ./internal/... ./pkg/...

      - name: Lint
        run: golangci-lint run ./internal/... ./pkg/...

      - name: Proto lint
        run: buf lint proto/

      - name: Test
        run: go test ./internal/... ./pkg/... -v -race -count=1

      - name: Build
        run: go build ./...
