version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spatial
      POSTGRES_PASSWORD: spatial
      POSTGRES_DB: spatial
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spatial -d spatial"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  room-service:
    build:
      context: ../..
      dockerfile: build/docker/room-service.Dockerfile
    ports:
      - "9001:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPATIAL_POSTGRES__DSN: "postgres://spatial:spatial@postgres:5432/spatial?sslmode=disable"
      SPATIAL_REDIS__ADDR: "redis:6379"

  game-server:
    build:
      context: ../..
      dockerfile: build/docker/game-server.Dockerfile
    depends_on:
      - room-service
    environment:
      SPATIAL_GRPC__HOST: "game-server"
      SPATIAL_GRPC__PORT: "9000"

  gateway:
    build:
      context: ../..
      dockerfile: build/docker/gateway.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - room-service
      - redis:
          condition: service_healthy
    environment:
      SPATIAL_GATEWAY__WS_PORT: "8080"
      SPATIAL_GATEWAY__JWT_SECRET: "dev-secret-key-change-in-production"
      SPATIAL_REDIS__ADDR: "redis:6379"

volumes:
  pgdata:
